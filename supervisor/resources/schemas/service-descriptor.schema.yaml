apiVersion: isolator/v1
kind: ServiceDescriptorSchema
metadata:
  name: generic-service-descriptor
  version: "1.0"

description: >-
  Canonical service descriptor contract used by the supervisor and Home Assistant
  integration for all node-hosted services.

required:
  - apiVersion
  - kind
  - metadata
  - spec

fields:
  apiVersion:
    type: string
    const: isolator/v1

  kind:
    type: string
    const: ServiceDescriptor

  metadata:
    type: map
    required: [id, name, version]
    properties:
      id:
        type: string
        pattern: "^[a-z][a-z0-9_\\-]+$"
      name:
        type: string
      version:
        type: string

  spec:
    type: map
    required: [runtime, config_file, access_profile]
    properties:
      runtime:
        type: map
        required: [type, entrypoint]
        properties:
          type:
            type: string
            enum: [systemd, python_module, container]
          entrypoint:
            type: string

      config_file:
        type: map
        required: [path, format]
        properties:
          path:
            type: string
          format:
            type: string
            enum: [yaml, json, toml, ini]
          schema_ref:
            type: string

      access_profile:
        type: map
        required: [mode, port, tls_mode, auth_mode, exposure_scope]
        properties:
          mode:
            type: string
            enum: [localhost, upstream, isolated, all, explicit]
          bind_address:
            type: string
          port:
            type: integer
            min: 1
            max: 65535
          tls_mode:
            type: string
            enum: [off, self_signed, provided_cert]
          cert_file:
            type: string
          key_file:
            type: string
          auth_mode:
            type: string
            enum: [none, token, mTLS]
          allowed_origins:
            type: list
            items: string
          exposure_scope:
            type: string
            enum: [lan_only, vpn_only, tunnel_only]

      placement:
        type: map
        properties:
          can_run_with:
            type: list
            items: string
          cannot_run_with:
            type: list
            items: string
          prefers_node_labels:
            type: list
            items: string

      resources:
        type: map
        properties:
          cpu_cores:
            type: number
          ram_mb:
            type: integer
          disk_mb:
            type: integer

      low_power_profile:
        type: map
        properties:
          enabled:
            type: boolean
          duty_cycle_percent:
            type: integer
            min: 1
            max: 100
          wake_sources:
            type: list
            items: string
          max_avg_current_ma:
            type: integer
            min: 1
          min_battery_percent:
            type: integer
            min: 0
            max: 100
