apiVersion: perimetercontrol/v1
kind: ServiceDescriptor
metadata:
  id: perimeter_control
  name: Perimeter Control
  version: "1.0.0"

spec:
  runtime:
    type: systemd
    entrypoint: perimetercontrol.service

  config_file:
    path: ${PERIMETERCONTROL_CONFIG_PATH:-/mnt/PerimeterControl/conf/perimeterControl.conf.yaml}
    format: yaml
    schema_ref: schema://services/perimeter_control/v1

  access_profile:
    mode: upstream
    bind_address: ""
    port: 5006
    tls_mode: off
    auth_mode: none
    allowed_origins: []
    exposure_scope: lan_only

  placement:
    can_run_with: [ photo_booth, ble_gatt_repeater ]
    cannot_run_with: []
    prefers_node_labels: [ role=perimeter ]

  resources:
    cpu_cores: 1.0
    ram_mb: 256
    disk_mb: 1000
