# ============================================================
# Isolator HA Integration — Home Assistant Configuration
# ============================================================
#
# Copy relevant sections into your configuration.yaml.
# Store secrets in secrets.yaml, never in configuration.yaml.
#
# ── secrets.yaml (add these) ────────────────────────────────
#
#   isolator_pi_host: "192.168.69.11"
#   isolator_pi_user: "paul"
#   isolator_ssh_key_path: "/config/.ssh/pi_rsa"
#
# ── Lovelace resource (add once) ────────────────────────────
# Either via UI: Settings → Dashboards → Resources, or:
#
# lovelace:
#   resources:
#     - url: /local/isolator/ha-integration.js
#       type: module
#
# Copy ha-integration.js from dist/ to:
#   <config>/www/isolator/ha-integration.js

# ── shell_command: deploy triggers ───────────────────────────────────────────
#
# These let the Deploy Panel button (or automations) trigger deploys.
# The deploy.py script is cross-platform and runs on the HA host (Linux/container).
# It SSH's into the Pi and does zero Windows PowerShell.
#
# Adjust --services to match the services configured on each Pi.
shell_command:
  # Deploy everything to the Pi (all services in the deployment config)
  isolator_deploy: >-
    python3 /config/isolator-repo/ha-integration/scripts/deploy.py
    --config /config/isolator-repo/deployment.yaml
    2>&1 | tee /config/isolator-repo/deploy.log

  # Deploy without restarting services (safe for live systems)
  isolator_deploy_no_restart: >-
    python3 /config/isolator-repo/ha-integration/scripts/deploy.py
    --config /config/isolator-repo/deployment.yaml
    --no-restart
    2>&1 | tee /config/isolator-repo/deploy.log

  # Deploy only specific services (photo_booth example)
  isolator_deploy_photo_booth: >-
    python3 /config/isolator-repo/ha-integration/scripts/deploy.py
    --config /config/isolator-repo/deployment.yaml
    --services photo_booth
    2>&1 | tee /config/isolator-repo/deploy.log

  # Push local config changes to Pi (does NOT restart supervisor)
  isolator_sync_config: >-
    python3 /config/isolator-repo/ha-integration/scripts/deploy.py
    --config /config/isolator-repo/deployment.yaml
    --sync-config
    --skip-supervisor
    --no-restart
    2>&1 | tee /config/isolator-repo/deploy.log

# ── Optional: file sensor to surface deploy.log in HA ────────────────────────
sensor:
  - platform: command_line
    name: Isolator Last Deploy
    command: >-
      tail -5 /config/isolator-repo/deploy.log 2>/dev/null
      | python3 -c "
      import sys, json
      lines = [l.strip() for l in sys.stdin if l.strip()]
      last = lines[-1] if lines else ''
      try:
          obj = json.loads(last)
          print(('OK' if obj.get('ok') else 'FAIL') + ': ' + obj.get('step',''))
      except Exception:
          print(last[:80] if last else 'no log')
      "
    scan_interval: 30
    unique_id: isolator_last_deploy

# ── Optional: notify on failed deploy ────────────────────────────────────────
automation:
  - alias: "Isolator deploy failed"
    trigger:
      - platform: state
        entity_id: sensor.isolator_last_deploy
    condition:
      - condition: template
        value_template: "{{ 'FAIL' in states('sensor.isolator_last_deploy') }}"
    action:
      - service: persistent_notification.create
        data:
          title: "Isolator Deploy Failed"
          message: "{{ states('sensor.isolator_last_deploy') }}"
          notification_id: isolator_deploy_fail
