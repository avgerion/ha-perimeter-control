# ============================================================
# PerimeterControl HA Integration — Home Assistant Configuration
# ============================================================
#
# Copy relevant sections into your configuration.yaml.
# Store secrets in secrets.yaml, never in configuration.yaml.
#
# ── secrets.yaml (add these) ────────────────────────────────
#
#   perimetercontrol_pi_host: "192.168.69.11"
#   perimetercontrol_pi_user: "paul"
#   perimetercontrol_ssh_key_path: "/config/.ssh/pi_rsa"
#
# ── Lovelace resource (add once) ────────────────────────────
# Either via UI: Settings → Dashboards → Resources, or:
#
# lovelace:
#   resources:
#     - url: /local/perimetercontrol/ha-integration.js
#       type: module
#
# Copy ha-integration.js from dist/ to:
#   <config>/www/perimetercontrol/ha-integration.js

# ── shell_command: deploy triggers ───────────────────────────────────────────
#
# These let the Deploy Panel button (or automations) trigger deploys.
# The deploy.py script is cross-platform and runs on the HA host (Linux/container).
# It SSH's into the Pi and does zero Windows PowerShell.
#
# Adjust --services to match the services configured on each Pi.
shell_command:
  # Deploy everything to the Pi (all services in the deployment config)

  perimetercontrol_deploy: >-
    python3 /config/perimetercontrol-repo/ha-integration/scripts/deploy.py
    --config /config/perimetercontrol-repo/deployment.yaml 2>&1 | tee
    /config/perimetercontrol-repo/deploy.log

  # Deploy without restarting services (safe for live systems)

  perimetercontrol_deploy_no_restart: >-
    python3 /config/perimetercontrol-repo/ha-integration/scripts/deploy.py
    --config /config/perimetercontrol-repo/deployment.yaml --no-restart 2>&1 |
    tee /config/perimetercontrol-repo/deploy.log

  # Deploy only specific services (photo_booth example)

  perimetercontrol_deploy_photo_booth: >-
    python3 /config/perimetercontrol-repo/ha-integration/scripts/deploy.py
    --config /config/perimetercontrol-repo/deployment.yaml --services
    photo_booth 2>&1 | tee /config/perimetercontrol-repo/deploy.log

  # Push local config changes to Pi (does NOT restart supervisor)

  perimetercontrol_sync_config: >-
    python3 /config/perimetercontrol-repo/ha-integration/scripts/deploy.py
    --config /config/perimetercontrol-repo/deployment.yaml --sync-config
    --skip-supervisor --no-restart 2>&1 | tee
    /config/perimetercontrol-repo/deploy.log

# ── Optional: file sensor to surface deploy.log in HA ────────────────────────
sensor:
  - platform: command_line
    name: PerimeterControl Last Deploy
    command: >-
      tail -5 /config/perimetercontrol-repo/deploy.log 2>/dev/null | python3 -c
      " import sys, json lines = [l.strip() for l in sys.stdin if l.strip()]
      last = lines[-1] if lines else '' try:
          obj = json.loads(last)
          print(('OK' if obj.get('ok') else 'FAIL') + ': ' + obj.get('step',''))
      except Exception:
          print(last[:80] if last else 'no log')
      "
    scan_interval: 30
    unique_id: perimetercontrol_last_deploy

# ── Optional: notify on failed deploy ────────────────────────────────────────
automation:
  - alias: "PerimeterControl deploy failed"
    trigger:
      - platform: state
        entity_id: sensor.perimetercontrol_last_deploy
    condition:
      - condition: template
        value_template: "{{ 'FAIL' in states('sensor.perimetercontrol_last_deploy') }}"
    action:
      - service: persistent_notification.create
        data:
          title: "PerimeterControl Deploy Failed"
          message: "{{ states('sensor.perimetercontrol_last_deploy') }}"
          notification_id: perimetercontrol_deploy_fail
