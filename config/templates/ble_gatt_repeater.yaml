# BLE GATT Repeater Configuration
scan_interval: 30
connection_timeout: 10
devices:
  - name: "Any Health Thermometer"
    service_uuid: "1809"
    characteristics:
      - "2a1c" # Temperature Measurement

dashboard:
  server:
    host: "0.0.0.0"
    port: 8091
    type: "bokeh"
  features:
    device_scanner: true
    gatt_browser: true
    characteristic_monitor: true
    connection_status: true
  data_refresh_interval: 5
