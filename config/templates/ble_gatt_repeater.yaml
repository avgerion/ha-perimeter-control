# BLE GATT Repeater Configuration - REFERENCE ONLY
#
# This file shows the SCHEMA for BLE GATT Repeater configuration.
# DO NOT edit this file to configure BLE settings.
#
# Instead, edit: config/perimeterControl.conf.yaml
# (This template is for documentation purposes only and is not deployed.)
#
