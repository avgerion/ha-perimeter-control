# GPIO Control Service Configuration
pins:
  - id: relay1
    gpio_pin: 17
    type: switch
    friendly_name: Relay 1
    active_high: true
    initial_state: off

  - id: led1
    gpio_pin: 18
    type: light
    friendly_name: Status LED
    active_high: true
    initial_state: on
    initial_brightness: 255

dashboard:
  server:
    host: "0.0.0.0"
    port: 8095
    type: "bokeh"
  features:
    pin_status: true
    relay_control: true
    led_control: true
  data_refresh_interval: 10
