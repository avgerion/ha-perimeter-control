# GPIO Control Service Configuration - REFERENCE ONLY
#
# This file shows the SCHEMA and AVAILABLE OPTIONS for GPIO configuration.
# DO NOT edit this file to change your Pi's GPIO pins.
#
# Instead, edit: config/perimeterControl.conf.yaml
# (This template is for documentation purposes only and is not deployed.)
#
# For complete usage examples and troubleshooting, see:
# - docs/CONFIG-TEMPLATES-GUIDE.md
# - docs/YAML-CONFIGURATION-SCHEMA.md

# Example showing all possible fields (not all required):
gpio_control:
  example_instance_name:       # Unique instance name on this Pi
    pins:
      - id: example_pin        # Required: unique ID for this pin
        gpio_pin: 17           # Required: GPIO pin number (integer, 0+)
        type: switch           # Required: switch | light | binary_sensor
        direction: output      # Optional: input | output (inferred from type if omitted)
        
        # Optional fields (show defaults):
        friendly_name: "Pin Description"  # Default: id in title case
        active_high: true                 # Default: true
        initial_state: off                # Default: off (for output pins)
        initial_brightness: 255           # Default: 255 (for light outputs only)
        icon: mdi:icon-name               # Default: mdi:toggle-switch (switch/output) or mdi:lightbulb (light/output)
        pull_mode: none                   # Optional: none | pull_up | pull_down (for input pins only)

