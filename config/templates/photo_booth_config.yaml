# Photo Booth Configuration
# Camera device and capture settings
camera_device: "/dev/video0"
resolution: "1920x1080"
quality: 85

# Photo storage
photo_directory: "/opt/PerimeterControl/state/photos"
max_storage_mb: 1000

# Streaming configuration
streaming:
  enabled: true          # Enable gstreamer MJPEG streaming
  stream_port: 8100     # HTTP MJPEG stream port

# Motion detection
motion_detection: true

# Timelapse configuration
timelapse:
  enabled: false        # Enable automatic timelapse captures
  interval_seconds: 300 # Capture every 5 minutes

# Dashboard settings
dashboard:
  server:
    host: "0.0.0.0"
    port: 8093
    type: "bokeh"
  features:
    live_stream: true
    motion_detection: true
    manual_capture: true
