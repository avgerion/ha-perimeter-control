# ESL AP Configuration
advertising:
  interval_ms: 1000
  tx_power: 0 # dBm
  company_id: 0x2e5 # Qualcomm
security:
  encryption_key: "default_key_change_me"
  auth_required: true
displays:
  max_concurrent: 50
  sync_interval: 3600
protocols:
  supported: ["esl_1.0", "esl_2.0"]
  default: "esl_2.0"

dashboard:
  server:
    host: "0.0.0.0"
    port: 8092
    type: "bokeh"
  features:
    display_management: true
    layout_editor: true
    advertising_status: true
    connected_displays: true
  data_refresh_interval: 30
