# Network Isolator Configuration - REFERENCE ONLY
#
# This file shows the SCHEMA for Network Isolator configuration.
# DO NOT edit this file to configure your network topology.
#
# Instead, edit: config/perimeterControl.conf.yaml
# (This template is for documentation purposes only and is not deployed.)
#
# See docs/CONFIG-TEMPLATES-GUIDE.md for usage examples.

# Network Isolator Configuration
dashboard:
  server:
    port: 5006

interfaces:
  - name: eth0
    monitor: true
    firewall: true
  - name: wlan0
    monitor: true
    firewall: false
rules:
  default_policy: DROP
  allowed_ports: [ 22, 80, 443, 8080 ]
monitoring:
  interval: 60
  log_traffic: true
