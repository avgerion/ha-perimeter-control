apiVersion: PerimeterControl/v1
kind: ServiceDescriptor
metadata:
  id: ble_gatt_repeater
  name: BLE GATT Repeater
  version: "1.0.0"

spec:
  runtime:
    type: python_module
    entrypoint: supervisor.capabilities.ble_gatt_repeater

  config_file:
    path: /mnt/PerimeterControl/conf/ble-gatt-repeater.yaml
    format: yaml
    schema_ref: schema://services/ble_gatt_repeater/v1

  access_profile:
    mode: localhost
    bind_address: ""
    port: 8091
    tls_mode: off
    auth_mode: token
    allowed_origins: []
    exposure_scope: tunnel_only

  placement:
    cannot_run_with: [ pawr_esl_ap ]
    prefers_node_labels: [ role=ble-gateway ]

  resources:
    cpu_cores: 0.5
    ram_mb: 256
    disk_mb: 500
