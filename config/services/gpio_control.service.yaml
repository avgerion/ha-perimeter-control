apiVersion: PerimeterControl/v1
kind: ServiceDescriptor
metadata:
  id: gpio_control
  name: GPIO Control
  version: "1.0.0"

spec:
  runtime:
    type: python_module
    entrypoint: supervisor.capabilities.gpio_control

  config_file:
    path: /mnt/PerimeterControl/conf/perimeterControl.conf.yaml
    format: yaml
    schema_ref: schema://services/gpio_control/v1

  access_profile:
    mode: upstream
    bind_address: ""
    port: 8095
    tls_mode: off
    auth_mode: token
    allowed_origins: []
    exposure_scope: lan_only

  placement:
    can_run_with: [photo_booth, wildlife_monitor, network_isolator]
    cannot_run_with: []
    prefers_node_labels: [feature=gpio]

  resources:
    cpu_cores: 0.1
    ram_mb: 64
    disk_mb: 50

  system_deps:
    apt:
      - gpiod
