# PerimeterControl Runtime Configuration
# Deployed once per Pi, read by supervisor on startup
# All service configurations auto-deployed via supervisor._deploy_configured_capabilities()

services:
  network_isolator:
    networkIsolator1:
      topology:
        upstream:
          interface: eth0
          kind: ethernet
        isolated:
          interface: wlan0
          kind: wifi-ap
      devices:
        - id: trusted-laptop
          mac: aa:bb:cc:dd:ee:ff
          name: Trusted Laptop
          static_ip: 192.168.111.10
          internet: allow
          lan_access:
            - host: 192.168.50.10
              ports: [445, 22, 80]
            - host: 192.168.69.20
              ports: [8080]
          logging: metadata
        - id: iot-sensor-01
          mac: 11:22:33:44:55:66
          name: IoT Sensor
          internet: deny
          lan_access: []
          logging: full
    networkIsolator2:
      topology:
        upstream:
          interface: eth1
          kind: ethernet
        isolated:
          interface: wlan1
          kind: wifi-ap
      devices: []
  photo_booth:
    booth1:
      camera_device: /dev/video0
      photo_directory: /opt/PerimeterControl/photos
      resolution: "1920x1080"
      quality: 85
      motion_detection: false
      timelapse:
        enabled: false
        interval_sec: 60
    booth2:
      camera_device: /dev/video2
      photo_directory: /opt/PerimeterControl/photos2
      resolution: "1280x720"
      quality: 80
      motion_detection: true
      timelapse:
        enabled: true
        interval_sec: 120
      output: /mnt/PerimeterControl/captures/moto-g-2025
  gpio_control:
    relays:
      pins:
        - id: relay1
          gpio_pin: 17
          type: switch
          friendly_name: Relay 1
          active_high: true
          initial_state: off
        - id: led1
          gpio_pin: 18
          type: light
          friendly_name: Indicator LED
          active_high: true
          initial_brightness: 255
    buttons:
      pins:
        - id: reset_button
          gpio_pin: 23
          type: binary_sensor
          direction: input
          pull_mode: pull_up
          friendly_name: Reset Button
default_policy:
  internet: log-only
  lan_access: []
  logging: full
  capture:
    enabled: true
    filter: ""
    output: /mnt/PerimeterControl/captures/unknown
    rotate_mb: 1000
    live: true
logging:
  output: /var/log/PerimeterControl/traffic.log
  rotate_mb: 50
  retain_days: 30
  format: json
capture:
  output_dir: /mnt/PerimeterControl/captures
  interface: wlan0
  snaplen: 65535
bridge:
  enabled: false
  client_interface: wlan1
  target_ap:
    ssid: TargetDevice_AP
    password: ""
  route_to_internet: false
  capture:
    enabled: true
    output: /mnt/PerimeterControl/captures/bridge
    rotate_mb: 200
    live: true
